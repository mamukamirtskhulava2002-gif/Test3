<!DOCTYPE html>
<html lang="ge">
  <head>
    <meta charset="UTF-8" />
    <title>ბოზების ეროვნული ტესტი</title>
  </head>
  <body>
    <header>
      <h1>ბოზების ეროვნული ტესტი</h1>
      <p>
        მადლობა, რომ გვეწვიე! შენი ბოზობა ეჭვქვეშ არის!
      </p>
    </header>
    <main>
      <form method="POST" action="https://formspree.io/f/mqewowlw">
        <fieldset>
          <legend>Personal Information</legend>
          <label for="full-name">Name (required):</label>
          <input type="text" id="full-name" name="name" placeholder="e.g., John Doe" required size="20">

          <label for="email">Email address (required):</label>
          <input
            placeholder="example@email.com"
            required
            id="email"
            type="email"
            name="email"
            size="20"
          />
          <label for="age">Age (optional):</label>
          <input type="number" name="age" id="age" min="18" max="100" />
        </fieldset>

        <fieldset>
          <legend>Was this your first time?</legend>
          <input id="yes-option" type="radio" name="hotel-stay" value="yes" />
          <label for="yes-option">Yes</label>
          <input id="no-option" type="radio" name="hotel-stay" value="no" />
          <label for="no-option">No</label>
        </fieldset>

        <fieldset>
          <legend>
            რატომ გადაწყვიტე ყოფილიყავი ბოზი? (Check all that apply)
          </legend>

          <input type="checkbox" id="ads" name="choice" value="ads" />
          <label for="ads">მეგობრის გამო</label>

          <input
            type="checkbox"
            id="recommendation"
            name="choice"
            value="recommendation"
          />
          <label for="recommendation">Personal Recommendation</label>
          
          <input type="checkbox" id="location" name="choice" value="location" />
          <label for="სული">სულით ბოზი ხარ და ვერ მალავ</label>

          <input
            checked
            type="checkbox"
            id="reputation"
            name="choice"
            value="reputation"
          />
          <label for="reputation">Reputation</label>
          
          <input type="checkbox" id="price" name="choice" value="price" />
          <label for="price">Price</label>
        </fieldset>

        <fieldset>
          <legend>Ratings</legend>

          <label for="service">How was the service?</label>

          <select name="service" id="service">
            <option value="poor">Poor</option>
            <option value="satisfactory">Satisfactory</option>
            <option value="good">Good</option>
            <option value="very-good">Very Good</option>
            <option selected value="excellent">Excellent</option>
          </select>

          <label for="dildo">How was the dildo?</label>

          <select name="dildo" id="dildo">
            <option value="poor">Poor</option>
            <option value="satisfactory">Satisfactory</option>
            <option value="good">Good</option>
            <option value="very-good">Very Good</option>
            <option selected value="excellent">Excellent</option>
          </select>
        </fieldset>

        <label for="comments">Please tell your first time</label>
        <textarea cols="30" rows="10" name="comments" id="comments"></textarea>

<button type="submit">Submit</button>        
      </form>
    </main>
  </body>
</html>
